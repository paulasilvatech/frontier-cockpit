name: Validate

# Automated checks for the Frontier Cockpit workspace. Guards the GitHub
# Copilot primitives, deliverable gates, the context index, the local Docker
# stack definition, the dashboard application build, and script quality on
# every push and pull request to develop and main.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  repo-gates:
    name: Primitives and deliverables
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit skills (frontmatter, naming, portability)
        run: bash .github/scripts/audit-skills.sh

      - name: Audit external content provenance
        run: bash .github/scripts/audit-external-content.sh

      - name: Audit primitives (agents, prompts, instructions)
        run: bash .github/scripts/audit-primitives.sh

      - name: Check llms.txt is current
        run: bash .github/scripts/generate-llms-txt.sh --check

      - name: Validate deliverable gates (architecture, diagrams)
        run: bash .github/scripts/validate-deliverables.sh

      - name: Validate Grafana dashboards
        run: bash .github/scripts/validate-dashboards.sh

  scripts:
    name: Shell script quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install shellcheck and zsh
        run: sudo apt-get update -q && sudo apt-get install -y -q shellcheck zsh

      - name: Shellcheck bash scripts
        run: |
          set -eu
          fail=0
          while IFS= read -r file; do
            if head -1 "$file" | grep -q 'bash'; then
              shellcheck -S warning "$file" || fail=1
            fi
          done < <(git ls-files '*.sh')
          exit "$fail"

      - name: Syntax check zsh scripts
        run: |
          set -eu
          fail=0
          while IFS= read -r file; do
            if head -1 "$file" | grep -q 'zsh'; then
              zsh -n "$file" || { echo "FAIL $file"; fail=1; }
            fi
          done < <(git ls-files '*.sh' '*.zsh')
          exit "$fail"

      - name: Parse and lint PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          $files = git ls-files '*.ps1'
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Host "FAIL $file"
              $errors | ForEach-Object { Write-Host "  $($_.Extent.StartLineNumber): $($_.Message)" }
            }
            else {
              Write-Host "ok: $file (parse)"
            }
          }
          if (Get-Module -ListAvailable PSScriptAnalyzer) {
            foreach ($file in $files) {
              $findings = Invoke-ScriptAnalyzer -Path $file -Severity Error
              if ($findings) {
                $failed = $true
                $findings | ForEach-Object { Write-Host "FAIL $($file): $($_.RuleName) line $($_.Line): $($_.Message)" }
              }
              else {
                Write-Host "ok: $file (analyzer)"
              }
            }
          }
          if ($failed) { exit 1 }

  dashboard-app:
    name: Dashboard API and web build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build dashboard API (TypeScript)
        working-directory: local-otel/frontend/api
        run: |
          npm ci
          npm run build

      - name: Build dashboard web (Vite)
        working-directory: local-otel/frontend/web
        run: |
          npm ci
          npm run build

  compose:
    name: Docker stack definition
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Create placeholder runtime env files
        working-directory: local-otel/stack
        run: |
          printf 'ASPIRE_DASHBOARD_API_KEY=ci-placeholder\n' > aspire-api-key.env
          printf 'GF_SECURITY_ADMIN_PASSWORD=ci-placeholder\n' > grafana-admin.env

      - name: Validate base compose file
        working-directory: local-otel/stack
        run: docker compose -f docker-compose.yml config -q

      - name: Validate hybrid compose overlay
        working-directory: local-otel/stack
        env:
          AZURE_OTLP_ENDPOINT: https://ci-placeholder.invalid
          AZURE_OTLP_TOKEN: ci-placeholder
        run: docker compose -f docker-compose.yml -f docker-compose.azure.yaml config -q

      - name: Build jobs and registry sidecar images
        working-directory: local-otel/stack
        run: docker compose -f docker-compose.yml build jobs registry

      # `docker compose config` never resolves remote tags, so a pinned image
      # that does not exist on the registry (like grafana-oss:11.6.16 once was)
      # only fails on the user's machine. Resolve every pinned tag here.
      - name: Verify pinned images exist on their registries
        working-directory: local-otel/stack
        run: |
          images=$(docker compose -f docker-compose.yml config --images | sort -u)
          status=0
          for image in $images; do
            case "$image" in
              *:*) ;; # pinned remote image, verify below
              *) continue ;; # locally built service images carry no remote tag
            esac
            if docker buildx imagetools inspect "$image" > /dev/null 2>&1; then
              echo "ok: $image"
            else
              echo "MISSING: $image does not resolve on its registry" >&2
              status=1
            fi
          done
          exit $status

  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git --redact --verbose /repo
