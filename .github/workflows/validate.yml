name: Validate

# Automated checks for the Frontier Cockpit workspace. This is the supported
# equivalent of a hook: it runs on every push and pull request to guard the
# GitHub Copilot primitives, deliverable gates, and context index.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit skills (frontmatter, naming, portability)
        run: bash .github/scripts/audit-skills.sh

      - name: Audit external content provenance
        run: bash .github/scripts/audit-external-content.sh

      - name: Audit primitives (agents, prompts, instructions)
        run: bash .github/scripts/audit-primitives.sh

      - name: Check llms.txt is current
        run: bash .github/scripts/generate-llms-txt.sh --check

      - name: Validate deliverable gates (decks, identity HTML, architecture, research)
        run: bash .github/scripts/validate-deliverables.sh
