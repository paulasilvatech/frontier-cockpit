# Local Tempo config (single binary) for trace history. Pinned to Tempo 2.6.x.
# Receives OTLP from the local Collector and stores blocks on local disk.
# Block retention is 30 days (720h), matching the agreed local retention window.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 720h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

usage_report:
  reporting_enabled: false
