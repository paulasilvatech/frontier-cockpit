name: copilot-otel-local

services:
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: aspire-dashboard
    env_file:
      - ./aspire-api-key.env
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      DOTNET_DASHBOARD_OTLP_ENDPOINT_URL: "http://0.0.0.0:18889"
      DOTNET_DASHBOARD_OTLP_HTTP_ENDPOINT_URL: "http://0.0.0.0:18890"
      DASHBOARD__OTLP__AUTHMODE: "ApiKey"
      DASHBOARD__OTLP__PRIMARYAPIKEY: "${ASPIRE_DASHBOARD_API_KEY}"
      DASHBOARD__API__ENABLED: "true"
      DASHBOARD__API__AUTHMODE: "ApiKey"
      DASHBOARD__API__PRIMARYAPIKEY: "${ASPIRE_DASHBOARD_API_KEY}"
      DASHBOARD__TELEMETRYLIMITS__MAXLOGCOUNT: "50000"
      DASHBOARD__TELEMETRYLIMITS__MAXTRACECOUNT: "50000"
      DASHBOARD__TELEMETRYLIMITS__MAXMETRICSCOUNT: "50000"
      DASHBOARD__TELEMETRYLIMITS__MAXATTRIBUTECOUNT: "512"
    ports:
      - "127.0.0.1:18888:18888"
    restart: unless-stopped
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    container_name: copilot-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    env_file:
      - ./aspire-api-key.env
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      - aspire-dashboard
      - tempo
      - loki
    restart: unless-stopped
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.6.1
    container_name: copilot-otel-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped
    networks:
      - observability

  loki:
    image: grafana/loki:3.3.2
    container_name: copilot-otel-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: copilot-otel-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - observability

  registry:
    build:
      context: ..
      dockerfile: registry/Dockerfile
    container_name: copilot-otel-registry
    environment:
      FRONTIER_SKIP_ENV_ZSH: "true"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://otel-collector:4318/v1/metrics"
      REGISTRY_REFRESH_SECONDS: "300"
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/frontier-registry.last-ok && test $$(($$(date +%s) - $$(cat /tmp/frontier-registry.last-ok))) -lt 900"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - observability

  postgres:
    image: postgres:16-alpine
    container_name: copilot-otel-postgres
    environment:
      POSTGRES_DB: grafana
      POSTGRES_USER: grafana
      POSTGRES_PASSWORD: grafana
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafana -d grafana"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - observability

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: copilot-otel-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_PASSWORD: grafana
      GF_DATABASE_SSL_MODE: disable
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - observability

  frontier-dashboard-api:
    build:
      context: ../frontend/api
    container_name: frontier-dashboard-api
    environment:
      PORT: "8080"
      PROMETHEUS_URL: "http://prometheus:9090"
      TEMPO_URL: "http://tempo:3200"
      LOKI_URL: "http://loki:3100"
      GRAFANA_URL: "http://grafana:3000"
      ASPIRE_URL: "http://aspire-dashboard:18888"
      COLLECTOR_METRICS_URL: "http://otel-collector:9464/metrics"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      PUBLIC_GRAFANA_URL: "http://localhost:3000"
      PUBLIC_ASPIRE_URL: "http://localhost:18888"
      PUBLIC_PROMETHEUS_URL: "http://localhost:9090"
      PUBLIC_TEMPO_URL: "http://localhost:3200"
      PUBLIC_LOKI_URL: "http://localhost:3100"
      FRONTIER_PARTICIPANT_NAME: "${FRONTIER_PARTICIPANT_NAME:-Workshop Participant}"
      FRONTIER_PARTICIPANT_ROLE: "${FRONTIER_PARTICIPANT_ROLE:-Developer}"
      FRONTIER_PARTICIPANT_EMAIL: "${FRONTIER_PARTICIPANT_EMAIL:-}"
      FRONTIER_PARTICIPANT_TEAM: "${FRONTIER_PARTICIPANT_TEAM:-}"
      FRONTIER_CUSTOMER_NAME: "${FRONTIER_CUSTOMER_NAME:-}"
      FRONTIER_DASHBOARD_TITLE: "${FRONTIER_DASHBOARD_TITLE:-Frontier Developer Cockpit}"
      FRONTIER_COPILOT_PLAN: "${FRONTIER_COPILOT_PLAN:-business}"
      FRONTIER_COPILOT_SEATS: "${FRONTIER_COPILOT_SEATS:-1}"
      FRONTIER_AI_CREDITS_USE_PROMO: "${FRONTIER_AI_CREDITS_USE_PROMO:-true}"
      FRONTIER_AI_CREDITS_MONTHLY_ALLOWANCE: "${FRONTIER_AI_CREDITS_MONTHLY_ALLOWANCE:-3000}"
    expose:
      - "8080"
    depends_on:
      prometheus:
        condition: service_started
      grafana:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
      postgres:
        condition: service_healthy
      registry:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - observability

  frontier-dashboard-web:
    build:
      context: ../frontend/web
    container_name: frontier-dashboard-web
    ports:
      - "127.0.0.1:3300:80"
    depends_on:
      frontier-dashboard-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - observability

networks:
  observability:
    name: copilot-otel-local

volumes:
  grafana-data:
  loki-data:
  postgres-data:
  prometheus-data:
  tempo-data:
